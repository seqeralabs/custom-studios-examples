name: Build and Push Docker Image

on:
  release:
    types: [published]
  push:
    branches:
      - windows
    paths:
      - '.seqera/Dockerfile'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for the images (e.g., v1.0.0). Defaults to "latest"'
        required: false
        type: string
        default: 'latest'
      # renovate: datasource=docker depName=public.cr.seqera.io/platform/connect-client
      connect_client_version:
        description: 'Version of connect-client to use (e.g., 0.9)'
        required: false
        type: string
        default: '0.10'

env:
  REGISTRY: ghcr.io
  # Use release tag for releases, input tag for manual runs, or 'latest' for push
  IMAGE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag || 'latest' }}
  # Use provided connect-client version or default to 0.9
  CONNECT_CLIENT_VERSION: ${{ inputs.connect_client_version || '0.10' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push windows
        uses: docker/build-push-action@v5
        with:
          context: ./.seqera
          push: true
          platforms: linux/amd64
          build-args: |
            CONNECT_CLIENT_VERSION=${{ env.CONNECT_CLIENT_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/windows:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/windows:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Custom Studios Example Container for Windows/Wine
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=windows
          cache-to: type=gha,mode=max,scope=windows 